name: MLflow CI Pipeline - Iris Classification

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah estimator (tree)"
        required: false
        default: "100"
      max_depth:
        description: "Max depth (0 = None)"
        required: false
        default: "10"

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # TAMBAHAN: pakai token agar bisa push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Upgrade mlflow ke 2.16.0 yang sudah fix konflik packaging
          pip install mlflow==2.16.0 scikit-learn==1.4.0 pandas==2.2.0 \
                      numpy==1.26.4 matplotlib==3.8.2 seaborn==0.13.2 \
                      joblib==1.3.2

      - name: Run MLflow Project (Training)
        run: |
          echo "=== Struktur repo ==="
          ls -la
          mlflow run . \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '100' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '10' }}

      - name: Upload MLflow Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-artifacts
          path: |
            mlruns/
            mlproject_artifacts/
            run_id.txt

      - name: Commit Artifacts to Repository
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI Bot"
          mkdir -p saved_artifacts
          cp -r mlproject_artifacts/* saved_artifacts/ 2>/dev/null || true
          cp run_id.txt saved_artifacts/ 2>/dev/null || true
          git add saved_artifacts/
          git diff --staged --quiet || git commit -m "ci: save training artifacts [skip ci]"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Patch Model Requirements (fix all env conflicts)
        run: |
          echo "=== File-file yang akan di-patch ==="
          find mlruns/ -name "requirements.txt" -o -name "python_env.yaml" \
               -o -name "conda.yaml" | grep artifacts

          # 1. Patch requirements.txt - hapus wheel dan packaging conflict
          CLEAN_REQS="scikit-learn==1.4.0
          numpy==1.26.4
          pandas==2.2.0
          cloudpickle==3.1.2
          scipy==1.12.0
          joblib==1.3.2"
          for f in $(find mlruns/ -path "*/artifacts/model/requirements.txt"); do
            echo "Patching requirements: $f"
            echo "$CLEAN_REQS" > $f
            cat $f
          done

          # 2. Patch python_env.yaml - upgrade Python 3.8 ke 3.10
          for f in $(find mlruns/ -path "*/artifacts/model/python_env.yaml"); do
            echo "=== Sebelum patch python_env.yaml ==="
            cat $f
            sed -i 's/python_version:.*"3\.8.*"/python_version: "3.10.14"/' $f
            sed -i "s/python_version:.*'3\.8.*'/python_version: '3.10.14'/" $f
            sed -i 's/3\.8\.[0-9]*/3.10.14/g' $f
            echo "=== Sesudah patch ==="
            cat $f
          done

          # 3. Patch conda.yaml - upgrade Python 3.8 ke 3.10
          for f in $(find mlruns/ -path "*/artifacts/model/conda.yaml"); do
            echo "=== Sebelum patch conda.yaml ==="
            cat $f
            sed -i 's/python=3\.8\.[0-9]*/python=3.10.14/g' $f
            sed -i 's/python=3\.8/python=3.10.14/g' $f
            echo "=== Sesudah patch ==="
            cat $f
          done

          # 4. Patch MLmodel - upgrade Python 3.8 ke 3.10
          for f in $(find mlruns/ -name "MLmodel"); do
            echo "=== Sebelum patch MLmodel ==="
            cat $f
            sed -i 's/python_version: 3\.8\.[0-9]*/python_version: 3.10.14/g' $f
            sed -i 's/python_version: 3\.8/python_version: 3.10.14/g' $f
            echo "=== Sesudah patch ==="
            cat $f
          done

      - name: Build Docker Image (mlflow models build-docker)
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "Run ID dari run_id.txt: $RUN_ID"

          # Cari MLmodel dari semua run yang ada, pilih yang TERBARU
          MLMODEL_PATH=$(find mlruns/ -name "MLmodel" -printf "%T@ %p\n" \
                        2>/dev/null | sort -n | tail -1 | awk '{print $2}')

          if [ -z "$MLMODEL_PATH" ]; then
            echo "ERROR: Tidak ada MLmodel ditemukan!"
            find mlruns/ -type f | head -20
            exit 1
          fi

          MODEL_URI=$(dirname $MLMODEL_PATH)
          echo "Model URI (terbaru): $MODEL_URI"

          # Verifikasi requirements.txt sudah bersih
          echo "=== requirements.txt yang akan dipakai ==="
          cat "${MODEL_URI}/requirements.txt"

          # PATCH: Force MLflow's Docker template to use the Python 3.8 specific pip URL
          MLFLOW_DIR=$(python -c "import mlflow, os; print(os.path.dirname(mlflow.__file__))")
          find $MLFLOW_DIR -type f -name "*.py" -exec sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.8/get-pip.py|g' {} +

          mlflow models build-docker \
            -m "$MODEL_URI" \
            -n "${{ secrets.DOCKER_USERNAME }}/iris-classifier"

      - name: Push Docker Image to Docker Hub
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest \
                     ${{ secrets.DOCKER_USERNAME }}/iris-classifier:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-classifier:${{ github.sha }}

      - name: Save Docker Hub Link
        run: |
          # FIX: simpan di root, bukan MLProject/
          echo "https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/iris-classifier" \
               > docker_hub_link.txt
          cat docker_hub_link.txt
