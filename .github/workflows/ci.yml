name: MLflow CI Pipeline - Iris Classification

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah estimator (tree)"
        required: false
        default: "100"
      max_depth:
        description: "Max depth (0 = None)"
        required: false
        default: "10"

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.11.1 scikit-learn==1.4.0 pandas==2.2.0 \
                      numpy==1.26.4 matplotlib==3.8.2 seaborn==0.13.2 \
                      joblib==1.3.2

      # 4. Jalankan MLflow Project
      - name: Run MLflow Project (Training)
        run: |
          echo "=== Struktur repo ==="
          ls -la
          mlflow run . \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '100' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '10' }}

      # 5. Simpan artefak MLflow ke GitHub
      - name: Upload MLflow Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-artifacts
          path: |
            mlruns/
            mlproject_artifacts/
            run_id.txt
      # 6. Commit artefak ke branch gh-artifacts
      - name: Commit Artifacts to Repository
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI Bot"
          mkdir -p saved_artifacts
          cp -r mlproject_artifacts/* saved_artifacts/ 2>/dev/null || true
          cp run_id.txt saved_artifacts/ 2>/dev/null || true
          git add saved_artifacts/
          git diff --staged --quiet || git commit -m "ci: save training artifacts [skip ci]"
          git push

      # 7. Setup Docker (untuk build Docker image)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 8. Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 9. Build Docker Image dengan mlflow models build-docker
      - name: Build Docker Image (mlflow models build-docker)
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "Run ID: $RUN_ID"
          MODEL_URI="MLProject/mlruns/0/${RUN_ID}/artifacts/model"
          mlflow models build-docker \
            -m "$MODEL_URI" \
            -n "${{ secrets.DOCKER_USERNAME }}/iris-classifier" \
            --enable-mlserver

      # 10. Push Docker Image ke Docker Hub
      - name: Push Docker Image to Docker Hub
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest \
                     ${{ secrets.DOCKER_USERNAME }}/iris-classifier:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-classifier:${{ github.sha }}
          echo "Docker image berhasil di-push ke Docker Hub!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest"

      # 11. Simpan Docker Hub link
      - name: Save Docker Hub Link
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/iris-classifier" \
               > MLProject/docker_hub_link.txt
          cat MLProject/docker_hub_link.txt
