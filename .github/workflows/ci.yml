name: MLflow CI Pipeline - Iris Classification

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Jumlah estimator (tree)"
        required: false
        default: "100"
      max_depth:
        description: "Max depth (0 = None)"
        required: false
        default: "10"

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # TAMBAHAN: pakai token agar bisa push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.11.1 scikit-learn==1.4.0 pandas==2.2.0 \
                      numpy==1.26.4 matplotlib==3.8.2 seaborn==0.13.2 \
                      joblib==1.3.2

      - name: Run MLflow Project (Training)
        run: |
          echo "=== Struktur repo ==="
          ls -la
          mlflow run . \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '100' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '10' }}

      - name: Upload MLflow Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-artifacts
          path: |
            mlruns/
            mlproject_artifacts/
            run_id.txt

      - name: Commit Artifacts to Repository
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI Bot"
          mkdir -p saved_artifacts
          cp -r mlproject_artifacts/* saved_artifacts/ 2>/dev/null || true
          cp run_id.txt saved_artifacts/ 2>/dev/null || true
          git add saved_artifacts/
          git diff --staged --quiet || git commit -m "ci: save training artifacts [skip ci]"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Patch Model Requirements (fix packaging conflict)
        run: |
          echo "=== Mencari requirements.txt model ==="
          find mlruns/ -name "requirements.txt" | head -5

          for req_file in $(find mlruns/ -name "requirements.txt"); do
            echo "Patching: $req_file"
            # Ganti packaging==23.2 dengan packaging>=24.0
            sed -i 's/packaging==23\.2/packaging>=24.0/' $req_file
            # Hapus baris wheel jika ada (biarkan pip resolve sendiri)
            sed -i '/^wheel==/d' $req_file
            echo "=== Isi setelah patch ==="
            cat $req_file
          done

      - name: Build Docker Image (mlflow models build-docker)
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "Run ID: $RUN_ID"
      
          EXP_ID=$(ls mlruns/ | grep -v "models" | grep -v "0" | head -1)
          if [ -z "$EXP_ID" ]; then
            EXP_ID="0"
          fi
          echo "Experiment ID: $EXP_ID"
      
          MODEL_URI="mlruns/${EXP_ID}/${RUN_ID}/artifacts/model"
      
          if [ ! -f "${MODEL_URI}/MLmodel" ]; then
            echo "=== DEBUG: Mencari MLmodel ==="
            find mlruns/ -name "MLmodel" 2>/dev/null
            MLMODEL_PATH=$(find mlruns/ -name "MLmodel" | head -1)
            MODEL_URI=$(dirname $MLMODEL_PATH)
          fi
      
          echo "Model URI: $MODEL_URI"
      
          mlflow models build-docker \
            -m "$MODEL_URI" \
            -n "${{ secrets.DOCKER_USERNAME }}/iris-classifier"

      - name: Push Docker Image to Docker Hub
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest \
                     ${{ secrets.DOCKER_USERNAME }}/iris-classifier:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-classifier:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-classifier:${{ github.sha }}

      - name: Save Docker Hub Link
        run: |
          # FIX: simpan di root, bukan MLProject/
          echo "https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/iris-classifier" \
               > docker_hub_link.txt
          cat docker_hub_link.txt
